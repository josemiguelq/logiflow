name: logiflow_mobile
description: LogiFlow — App do Entregador
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.5.0
  dio_cookie_manager: ^3.1.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Image picker
  image_picker: ^1.1.2

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1

  # URL launching (Google Maps deeplinks)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
